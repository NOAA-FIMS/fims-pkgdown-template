name: Sync FIMS pkgdown template

# This workflow runs in DOWNSTREAM repos created from fims-pkgdown-template.
# It periodically pulls template-managed files (CSS, favicons) from
# NOAA-FIMS/fims-pkgdown-template and opens a PR if anything has changed.
#
# Template-managed files (will be overwritten on sync):
#   pkgdown/extra.css
#   pkgdown/favicon/**
#   pkgdown/FIMS_PKGDOWN_TEMPLATE_VERSION
#
# Files NEVER touched by this workflow (downstream owns these):
#   pkgdown/_pkgdown.yml
#
# Required permissions:
#   The GITHUB_TOKEN needs contents: write and pull-requests: write.
#   If your org restricts cross-repo access, set a PAT in a repo secret named
#   FIMS_TEMPLATE_SYNC_TOKEN and it will be used automatically.

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout downstream repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout fims-pkgdown-template into temp directory
        uses: actions/checkout@v4
        with:
          repository: NOAA-FIMS/fims-pkgdown-template
          path: .fims-pkgdown-template
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy template-managed files
        run: |
          mkdir -p pkgdown/favicon

          # extra.css
          cp .fims-pkgdown-template/pkgdown/extra.css pkgdown/extra.css

          # favicon directory (all files)
          cp -r .fims-pkgdown-template/pkgdown/favicon/. pkgdown/favicon/

          # version marker
          cp .fims-pkgdown-template/pkgdown/FIMS_PKGDOWN_TEMPLATE_VERSION \
             pkgdown/FIMS_PKGDOWN_TEMPLATE_VERSION

          # Clean up temp checkout
          rm -rf .fims-pkgdown-template

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get template version
        if: steps.changes.outputs.changed == 'true'
        id: version
        run: |
          VERSION=$(cat pkgdown/FIMS_PKGDOWN_TEMPLATE_VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/sync-fims-pkgdown-template-${{ steps.version.outputs.version }}
          commit-message: |
            chore: sync pkgdown files from fims-pkgdown-template ${{ steps.version.outputs.version }}

            Updated template-managed files:
              - pkgdown/extra.css
              - pkgdown/favicon/
              - pkgdown/FIMS_PKGDOWN_TEMPLATE_VERSION
          title: "chore: sync pkgdown files from fims-pkgdown-template ${{ steps.version.outputs.version }}"
          body: |
            This PR was opened automatically by the `sync-fims-pkgdown-template` workflow.

            It updates the following template-managed files from
            [NOAA-FIMS/fims-pkgdown-template](https://github.com/NOAA-FIMS/fims-pkgdown-template):

            - `pkgdown/extra.css`
            - `pkgdown/favicon/`
            - `pkgdown/FIMS_PKGDOWN_TEMPLATE_VERSION`

            **Your `pkgdown/_pkgdown.yml` was not modified.**

            Please review and merge when ready.
          delete-branch: true
